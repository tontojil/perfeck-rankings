name: Deploy PerfeckRankings

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_APP_API: 'perfeck-rankings-api'
  AZURE_APP_FE: 'perfeck-rankings-fe'

jobs:
  build:
    name: Compilar y testear
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore y Build
        run: |
          cd src/Api
          dotnet restore
          dotnet build -c Release --no-restore

      - name: Test (si hay tests)
        run: |
          cd src/Api
          dotnet test -c Release --no-build --verbosity normal || true

  trivy:
    name: Escaneo de seguridad
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - codigo fuente
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Build imagen Docker API
        run: docker build -t perfeck-api:ci src/Api

      - name: Trivy - imagen Docker
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'perfeck-api:ci'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: trivy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init y Plan
        run: |
          cd infra/terraform
          terraform init
          terraform validate
          terraform plan -var "sql_admin_login=${{ secrets.SQL_ADMIN_LOGIN }}" -var "sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -out=tfplan

  deploy:
    name: Deploy a Azure
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Apply
        run: |
          cd infra/terraform
          terraform init
          terraform apply -auto-approve -var "sql_admin_login=${{ secrets.SQL_ADMIN_LOGIN }}" -var "sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}"

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_APP_API }}
          package: src/Api

      - name: Mostrar URLs
        run: |
          cd infra/terraform
          terraform output
