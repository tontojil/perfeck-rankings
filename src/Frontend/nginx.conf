server {
    listen 80;
    
    root /usr/share/nginx/html;
    index index.html;
    
    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /health {
        proxy_pass http://api:5000/health;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}
